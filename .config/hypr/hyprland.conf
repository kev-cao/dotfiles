# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

debug {
	disable_logs = false
	enable_stdout_logs = true
}


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,auto
monitor=DP-2,3840x1600@144.00,0x0,1
monitor=DP-1,1920x1080@120.00,-1920x420,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = wezterm
$fileManager = dolphin
$menu = anyrun
$browser = zen-browser


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = waybar
exec-once = hyprpaper
exec-once = mako
exec-once = wl-paste --watch cliphist store
exec-once = fcitx5 -d


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,20
env = HYPRCURSOR_SIZE,20

# For NVIDIA drivers. Do not remove.
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
cursor {
	no_hardware_cursors = true
}


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 15, 20, 20, 20

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(619eb4ee) rgba(89b2c6ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true

        special = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
workspace = 1, monitor:DP-2
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-2
workspace = 5, monitor:DP-2
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1
workspace = 10, monitor:DP-1

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true # You probably want this
    force_split = 2
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

ecosystem {
    no_donation_nag = true
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = -0.6 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = Meta_L # Set left meta (cmd on Mac)

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bindd = $mainMod, Return, Open terminal, exec, $terminal
bindd = $mainMod SHIFT, Q, Close active window, killactive,
# bind = $mainMod, M, exit,
# bind = $mainMod, E, exec, $fileManager
bindd = $mainMod SHIFT, Space, Toggle floating / tiling for the active window, togglefloating
bindd = $mainMod, Space, Open app launcher, exec, $menu
bindd = $mainMod, slash, Show keybinds, exec, hyprbind -d | anyrun --plugins libstdin.so --show-results-immediately true
# bind = $mainMod, P, pseudo, # dwindle
bindd = $mainMod, S, Select vertical split, layoutmsg, preselect d
bindd = $mainMod, V, Select horizontal split, layoutmsg, preselect r

# Move focus with mainMod + vim keys
bindd = $mainMod, H, Move focus left, movefocus, l
bindd = $mainMod, L, Move focus right, movefocus, r
bindd = $mainMod, K, Move focus up, movefocus, u
bindd = $mainMod, J, Move focus down, movefocus, d

# Cycle to floating windows
bindd = $mainMod, g, Cycle focus between floating and tiled windows, exec, $(hyprctl activewindow -j | jq '.floating') && hyprctl dispatch cyclenext tiled || hyprctl dispatch cyclenext floating

# Move window with mainMod + SHIFT + vim keys
bindd = $mainMod SHIFT, H, Move window left, movewindow, l
bindd = $mainMod SHIFT, L, Move window right, movewindow, r
bindd = $mainMod SHIFT, K, Move window up, movewindow, u
bindd = $mainMod SHIFT, J, Move window down, movewindow, d
bindd = $mainMod SHIFT, 0, Center the active window, centerwindow, 1

# Window movement submap.
bindd = $mainMod Shift, M, Toggle [Move] submap, submap, move
submap = move
bindd = , h, [Move] Move window left, movewindow, l
bindd = , l, [Move] Move window right, movewindow, r
bindd = , k, [Move] Move window up, movewindow, u
bindd = , j, [Move] Move window down, movewindow, d

bindde = SHIFT, h, [Move] Move floating window left, moveactive, -50 0
bindde = SHIFT, l, [Move] Move floating window right, moveactive, 50 0
bindde = SHIFT, k, [Move] Move floating window up, moveactive, 0 -50
bindde = SHIFT, j, [Move] Move floating window down, moveactive, 0 50

bindde = CTRL, h, [Move] Move floating window left (big step), moveactive, -200 0
bindde = CTRL, l, [Move] Move floating window right (big step), moveactive, 200 0
bindde = CTRL, k, [Move] Move floating window up (big step), moveactive, 0 -200
bindde = CTRL, j, [Move] Move floating window down (big step), moveactive, 0 200

bindd = , escape, [Move] Press escape to exit, submap, reset
submap = reset

# Switch workspaces with mainMod + [0-9]
bindd = $mainMod, 1, Switch to Workspace 1, workspace, 1
bindd = $mainMod, 2, Switch to Workspace 2, workspace, 2
bindd = $mainMod, 3, Switch to Workspace 3, workspace, 3
bindd = $mainMod, 4, Switch to Workspace 4, workspace, 4
bindd = $mainMod, 5, Switch to Workspace 5, workspace, 5
bindd = $mainMod, 6, Switch to Workspace 6, workspace, 6
bindd = $mainMod, 7, Switch to Workspace 7, workspace, 7
bindd = $mainMod, 8, Switch to Workspace 8, workspace, 8
bindd = $mainMod, 9, Switch to Workspace 9, workspace, 9
bindd = $mainMod, 0, Switch to Workspace 10, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bindd = $mainMod SHIFT, 1, Move to Workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move to Workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move to Workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move to Workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move to Workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move to Workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move to Workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move to Workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move to Workspace 9, movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move to Workspace 10, movetoworkspace, 10

# Example special workspace (scratchpad)
bindd = $mainMod, P, Toggle scratchpad, togglespecialworkspace, magic
bindd = $mainMod SHIFT, P, Move window to scratchpad, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bindd = $mainMod, mouse_down, Next workspace, workspace, e+1
bindd = $mainMod, mouse_up, Previous workspace, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindd = $mainMod CTRL, h, Shrink active window width, resizeactive, -50 0
bindd = $mainMod CTRL, l, Expand active window width, resizeactive, 50 0
bindd = $mainMod CTRL, k, Shrink active window height, resizeactive, 0 -50
bindd = $mainMod CTRL, j, Expand active window height, resizeactive, 0 50

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Notifications
bindd = $mainMod, backspace, Dismiss notifications, exec, makoctl dismiss -a

# Screenshot
bindd = $mainMod SHIFT, S, Screenshot region, exec, hyprshot -m region output --clipboard-only

bindd = $mainMod Shift, B, Open browser, exec, $browser
bindd = $mainMod Ctrl, B, Open blank browser window, exec, $browser --blank-window

# Clipboard
bindd = $mainMod Shift, y, Open clipboard history, exec, cliphist list | anyrun --show-results-immediately true --plugins libstdin.so | cliphist decode | wl-copy

# Toggle transparency of active window --- prevents it from going transparent
# when out of focus.
bindd = $mainMod Shift, o, Toggle window transparency, setprop, active opaque toggle


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Discord, messages, and music rules (master layout)
windowrule {
    name = workspace10
    match:class = ^(vesktop|com.github.th_ch.youtube_music)$

    workspace = 10
}

windowrule {
    name = floating-class
    match:class = ^(Bitwarden|org.kde.dolphin)$

    size = 1300, 900
    float = true
    center = on
}

windowrule {
    name = floating-title
    match:initial_title = ^Vivaldi Settings.*

    size = 1300, 900
    float = true
    center = on
}

windowrule {
    name = custom-floating
    match:initial_class = ^custom-floating$

    size = 1300, 900
    float = true
    center = on
}

# Ignore maximize requests from apps. You'll probably like this.
windowrule = match:class .*, suppress_event maximize

# Fix some dragging issues with XWayland
windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false, no_initial_focus on
